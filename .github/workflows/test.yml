name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run tests
        working-directory: plugins/session-bridge
        run: bash test.sh

      - name: Validate plugin
        run: claude plugin validate plugins/session-bridge
